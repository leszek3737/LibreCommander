[package]
name = "lc"
version = "0.0.7"
edition = "2024"
rust-version = "1.85"
description = "A fast Rust terminal file manager inspired by Midnight Commander"
license = "MIT"
readme = "README.md"
repository = "https://github.com/leszek3737/lc---Libre-Commander"

[dependencies]
chrono = "0.4.44"
rayon = "1"
crossterm = "0.29.0"
filetime = "0.2"
infer = "0.19"
notify = { version = "8", default-features = false, features = ["macos_fsevent"] }
ratatui = "0.30.0"
regex = "1"
serde = { version = "1.0", features = ["derive"] }
toml = "0.9"
unicode-width = "0.2"
users = "0.11.0"

[dev-dependencies]
tempfile = "3"
