[package]
name = "lc"
version = "0.0.7"
edition = "2024"
rust-version = "1.85"
description = "A fast Rust terminal file manager inspired by Midnight Commander"
license = "MIT"
readme = "README.md"
repository = "https://github.com/leszek3737/lc---Libre-Commander"

[dependencies]
chrono = "0.4.44"
regex = "1"
crossterm = "0.29.0"
ratatui = "0.30.0"
serde = { version = "1.0", features = ["derive"] }
toml = "0.9"
unicode-width = "0.2"
users = "0.11.0"

[dev-dependencies]
tempfile = "3"
