<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">How Libre Commander works</title>
  <desc id="desc">Four-step flow: dual panels, keyboard ops, background jobs with progress, pure render from AppState.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#10182b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" rx="22" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="217" rx="20.5" fill="none" stroke="#243049" stroke-width="1.5"/>

  <text x="56" y="44" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#e7eefc">How it works</text>
  <text x="56" y="68" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8b9bb8">sync event loop · job runner · pure UI</text>

  <!-- steps -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <!-- 1 -->
    <rect x="56" y="96" width="240" height="88" rx="14" fill="#121a2e" stroke="#2b3c5c"/>
    <text x="76" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#4ec9f5">01</text>
    <text x="76" y="152" font-size="18" font-weight="600" fill="#e7eefc">Two panels</text>
    <text x="76" y="174" font-size="13" fill="#8b9bb8">Source and destination</text>

    <path d="M308 140 H336" stroke="#2b3c5c" stroke-width="2"/>
    <path d="M328 132 L340 140 L328 148" fill="none" stroke="#4ec9f5" stroke-width="2"/>

    <!-- 2 -->
    <rect x="352" y="96" width="240" height="88" rx="14" fill="#121a2e" stroke="#2b3c5c"/>
    <text x="372" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#4ec9f5">02</text>
    <text x="372" y="152" font-size="18" font-weight="600" fill="#e7eefc">Keyboard ops</text>
    <text x="372" y="174" font-size="13" fill="#8b9bb8">F3–F8, filters, hotlist</text>

    <path d="M604 140 H632" stroke="#2b3c5c" stroke-width="2"/>
    <path d="M624 132 L636 140 L624 148" fill="none" stroke="#4ec9f5" stroke-width="2"/>

    <!-- 3 -->
    <rect x="648" y="96" width="240" height="88" rx="14" fill="#121a2e" stroke="#2b3c5c"/>
    <text x="668" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#4ec9f5">03</text>
    <text x="668" y="152" font-size="18" font-weight="600" fill="#e7eefc">Background jobs</text>
    <text x="668" y="174" font-size="13" fill="#8b9bb8">Progress + cancel points</text>

    <path d="M900 140 H928" stroke="#2b3c5c" stroke-width="2"/>
    <path d="M920 132 L932 140 L920 148" fill="none" stroke="#4ec9f5" stroke-width="2"/>

    <!-- 4 -->
    <rect x="944" y="96" width="200" height="88" rx="14" fill="#121a2e" stroke="#2b3c5c"/>
    <text x="964" y="126" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#4ec9f5">04</text>
    <text x="964" y="152" font-size="18" font-weight="600" fill="#e7eefc">Pure render</text>
    <text x="964" y="174" font-size="13" fill="#8b9bb8">AppState → Ratatui</text>
  </g>
</svg>
