<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Libre Commander</title>
  <desc id="desc">Dual-panel terminal file manager inspired by Midnight Commander. One offline Rust binary with keyboard-driven copy, move, archives, and preview.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#10182b"/>
    </linearGradient>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#162038"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#1a2438" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="26" fill="url(#grid)" opacity="0.45"/>
  <rect x="1.5" y="1.5" width="1197" height="357" rx="24.5" fill="none" stroke="#243049" stroke-width="1.5"/>

  <!-- left title block -->
  <g transform="translate(56 48)">
    <rect x="0" y="0" width="118" height="28" rx="8" fill="#162038" stroke="#2b3c5c" stroke-width="1"/>
    <text x="14" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8b9bb8" letter-spacing="1.5">TERMINAL · FM</text>

    <text x="0" y="88" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="700" fill="#e7eefc">Libre Commander</text>
    <text x="0" y="128" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" fill="#4ec9f5">Dual-panel file manager for the keyboard</text>

    <text x="0" y="168" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#a7b4cd">MC muscle memory. One static Rust binary.</text>
    <text x="0" y="192" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#a7b4cd">Offline by design. No async runtime.</text>

    <g transform="translate(0 230)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
      <rect x="0" y="0" width="72" height="28" rx="8" fill="#162038" stroke="#2b3c5c"/>
      <text x="14" y="19" fill="#5ad18a">lc</text>
      <rect x="84" y="0" width="92" height="28" rx="8" fill="#162038" stroke="#2b3c5c"/>
      <text x="98" y="19" fill="#e7eefc">MIT</text>
      <rect x="188" y="0" width="128" height="28" rx="8" fill="#162038" stroke="#2b3c5c"/>
      <text x="202" y="19" fill="#e7eefc">Rust 1.95+</text>
      <rect x="328" y="0" width="164" height="28" rx="8" fill="#162038" stroke="#2b3c5c"/>
      <text x="342" y="19" fill="#e7eefc">Linux · macOS</text>
    </g>
  </g>

  <!-- right: dual-panel motif -->
  <g transform="translate(700 46)">
    <rect x="0" y="0" width="444" height="268" rx="16" fill="url(#panelGlow)" stroke="#2b3c5c" stroke-width="1.5"/>
    <!-- title bar -->
    <rect x="0" y="0" width="444" height="34" rx="16" fill="#152036"/>
    <rect x="0" y="18" width="444" height="16" fill="#152036"/>
    <circle cx="22" cy="17" r="5" fill="#f74c00" opacity="0.85"/>
    <circle cx="40" cy="17" r="5" fill="#c9a227" opacity="0.75"/>
    <circle cx="58" cy="17" r="5" fill="#5ad18a" opacity="0.8"/>
    <text x="222" y="22" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8b9bb8">lc — dual panel</text>

    <!-- left pane -->
    <rect x="14" y="46" width="200" height="168" rx="8" fill="#0c1424" stroke="#243049"/>
    <rect x="14" y="46" width="200" height="26" rx="8" fill="#132038"/>
    <rect x="14" y="60" width="200" height="12" fill="#132038"/>
    <text x="28" y="64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8b9bb8">~/src</text>
    <!-- rows -->
    <text x="28" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#5ad18a">▸ docs</text>
    <rect x="20" y="102" width="188" height="20" rx="4" fill="#1a3a52"/>
    <text x="28" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#4ec9f5">▸ src</text>
    <text x="28" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#e7eefc">  Cargo.toml</text>
    <text x="28" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#e7eefc">  README.md</text>
    <text x="28" y="188" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#c45c7a">  archive.zip</text>

    <!-- right pane -->
    <rect x="230" y="46" width="200" height="168" rx="8" fill="#0c1424" stroke="#243049"/>
    <rect x="230" y="46" width="200" height="26" rx="8" fill="#132038"/>
    <rect x="230" y="60" width="200" height="12" fill="#132038"/>
    <text x="244" y="64" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8b9bb8">~/backup</text>
    <text x="244" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#5ad18a">▸ old</text>
    <text x="244" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#e7eefc">  notes.txt</text>
    <text x="244" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#e7eefc">  photo.png</text>
    <text x="244" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#8b9bb8">  .config</text>
    <text x="244" y="188" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#e7eefc">  draft.rs</text>

    <!-- F-key strip -->
    <g transform="translate(14 228)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">
      <rect width="416" height="26" rx="6" fill="#0c1424" stroke="#243049"/>
      <text x="12" y="17" fill="#8b9bb8">F3 View</text>
      <text x="78" y="17" fill="#8b9bb8">F4 Edit</text>
      <text x="144" y="17" fill="#4ec9f5">F5 Copy</text>
      <text x="214" y="17" fill="#8b9bb8">F6 Move</text>
      <text x="284" y="17" fill="#8b9bb8">F7 Mkdir</text>
      <text x="356" y="17" fill="#8b9bb8">F8 Del</text>
    </g>
  </g>
</svg>
